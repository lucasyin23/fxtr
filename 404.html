<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FXTRE Apparel</title>
<meta name="description" content="Page not found — FXTR, Fixture Apparel.">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0a;
    --ink:#f4f4f4;
    --muted:#7c7c7c;
    --line:rgba(255,255,255,0.14);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Space Mono',monospace;
    min-height:100svh;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:32px 24px;overflow-x:hidden;
  }
  .wrap{display:flex;flex-direction:column;align-items:center;gap:28px;max-width:520px;width:100%}

  .logo{
    width:min(56vw,260px);
    opacity:0;animation:rise .9s cubic-bezier(.2,.7,.2,1) .1s forwards;
  }

  .code{
    font-family:'Archivo',sans-serif;font-weight:900;
    font-size:clamp(64px,20vw,140px);line-height:.85;letter-spacing:.01em;
    opacity:0;animation:rise .9s cubic-bezier(.2,.7,.2,1) .25s forwards;
  }

  .status{
    display:flex;align-items:center;gap:14px;color:var(--muted);
    font-size:13px;letter-spacing:.42em;text-indent:.42em;text-transform:uppercase;
    opacity:0;animation:rise .9s cubic-bezier(.2,.7,.2,1) .4s forwards;
  }
  .status .ln{height:1px;width:34px;background:var(--line)}
  .screw{width:13px;height:13px;border:1.5px solid var(--muted);border-radius:50%;position:relative;flex:none}
  .screw::before{content:"";position:absolute;top:50%;left:2px;right:2px;height:1.5px;background:var(--muted);transform:translateY(-50%)}

  .home{
    font-family:'Archivo',sans-serif;font-weight:700;font-size:13px;letter-spacing:.06em;text-transform:uppercase;
    background:var(--ink);color:var(--bg);text-decoration:none;
    padding:14px 26px;border-radius:6px;transition:opacity .2s;
    opacity:0;animation:rise .9s cubic-bezier(.2,.7,.2,1) .55s forwards;
  }
  .home:hover{opacity:.82}

  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  @media (prefers-reduced-motion:reduce){
    .logo,.code,.status,.home{animation:none;opacity:1}
  }
  :focus-visible{outline:2px solid var(--ink);outline-offset:3px}
</style>
</head>
<body>
  <main class="wrap">
    <img class="logo" src="logo_white.png" alt="FXTR — Fixture Apparel">
    <h1 class="code">404</h1>
    <div class="status">
      <span class="ln"></span>
      <span class="screw" aria-hidden="true"></span>
      <span>Came loose</span>
      <span class="screw" aria-hidden="true"></span>
      <span class="ln"></span>
    </div>
    <a class="home" href="/">Back to FXTR</a>
  </main>
</body>
</html>
